{{- $matrixType := .Values.matrixServer.type | default "" -}}
{{- if ne $matrixType "tuwunel" -}}
{{- fail (printf "unsupported matrixServer.type %q: Phase 1 only supports \"tuwunel\"" $matrixType) -}}
{{- end -}}

{{- $gatewayType := .Values.aiGateway.type | default "" -}}
{{- if ne $gatewayType "higress" -}}
{{- fail (printf "unsupported aiGateway.type %q: Phase 1 only supports \"higress\"" $gatewayType) -}}
{{- end -}}

{{- $storageType := .Values.objectStorage.type | default "" -}}
{{- if ne $storageType "minio" -}}
{{- fail (printf "unsupported objectStorage.type %q: Phase 1 only supports \"minio\"" $storageType) -}}
{{- end -}}

{{- $expectedHigressEnabled := eq (include "hiclaw.gateway.higress.enabled" . | trim) "true" -}}
{{- $actualHigressEnabled := .Values.aiGateway.higress.enabled | default false -}}
{{- if ne $actualHigressEnabled $expectedHigressEnabled -}}
{{- fail (printf "aiGateway.higress.enabled=%t is inconsistent with aiGateway.type=%q; expected %t" $actualHigressEnabled $gatewayType $expectedHigressEnabled) -}}
{{- end -}}
