{{- if .Values.agents.podTemplate }}
{{- $comp := dict "root" . "component" "controller" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hiclaw.controller.fullname" . }}-agent-pod-template
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.component.labels" $comp | nindent 4 }}
data:
  # Base PodTemplateSpec applied by the controller to every Manager/Worker Pod.
  # See values.yaml (agents.podTemplate) and
  # hiclaw-controller/internal/backend/agent_pod_template.go (ApplyPodTemplate)
  # for the merge semantics.
  pod-template.yaml: |
{{- toYaml .Values.agents.podTemplate | nindent 4 }}
{{- end }}
