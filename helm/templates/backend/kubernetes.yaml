{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hiclaw.orchestrator.fullname" . }}-kubernetes
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.orchestrator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  {{- with .Values.rbac.additionalRules }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hiclaw.orchestrator.fullname" . }}-kubernetes
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.orchestrator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hiclaw.orchestrator.serviceAccountName" . }}
    namespace: {{ include "hiclaw.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "hiclaw.orchestrator.fullname" . }}-kubernetes
  apiGroup: rbac.authorization.k8s.io
{{- end }}
