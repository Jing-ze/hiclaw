apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiclaw.manager.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hiclaw.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "hiclaw.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- $rrsaManual := include "hiclaw.manager.rrsaManual" . }}
      serviceAccountName: {{ include "hiclaw.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "hiclaw.image" . }}
          imagePullPolicy: {{ .Values.manager.image.pullPolicy }}
          ports:
            - name: openclaw
              containerPort: {{ .Values.manager.service.targetPort }}
              protocol: TCP
          {{- $envSecret := include "hiclaw.shared.envFromSecretName" . | trim }}
          {{- if $envSecret }}
          envFrom:
            - secretRef:
                name: {{ $envSecret | quote }}
          {{- end }}
          env:
            - name: HICLAW_ORCHESTRATOR_URL
              value: {{ include "hiclaw.orchestrator.serviceURL" . | quote }}
            - name: HICLAW_DEFAULT_WORKER_RUNTIME
              value: {{ .Values.workerRuntime | default "openclaw" | quote }}
            {{- if and (include "hiclaw.isCloudPlatform" .) (not (index (.Values.manager.env | default dict) "HICLAW_RUNTIME")) }}
            - name: HICLAW_RUNTIME
              value: "aliyun"
            {{- else if (include "hiclaw.isGenericK8s" .) }}
            - name: HICLAW_RUNTIME
              value: "k8s"
            {{- end }}
            {{- if not .Values.manager.envFromSecret }}
            - name: HICLAW_MATRIX_URL
              value: {{ include "hiclaw.tuwunel.internalMatrixURL" . | quote }}
            - name: HICLAW_MATRIX_DOMAIN
              value: {{ include "hiclaw.tuwunel.matrixServerName" . | quote }}
            {{- end }}
            {{- range $k, $v := .Values.manager.env }}
            {{- if $v }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            {{- /* 通用 k8s 模式：注入 MinIO 和 Higress 环境变量 */ -}}
            {{- if (include "hiclaw.isGenericK8s" .) }}
            - name: HICLAW_MINIO_ENDPOINT
              value: {{ include "hiclaw.minio.internalURL" . | quote }}
            - name: HICLAW_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.minio.fullname" . }}
                  key: MINIO_ROOT_USER
            - name: HICLAW_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hiclaw.minio.fullname" . }}
                  key: MINIO_ROOT_PASSWORD
            - name: HICLAW_MINIO_BUCKET
              value: {{ .Values.minio.bucketName | quote }}
            {{- if .Values.higress.enabled }}
            - name: HICLAW_AI_GATEWAY_URL
              value: {{ include "hiclaw.higress.gatewayURL" . | quote }}
            - name: HICLAW_HIGRESS_CONSOLE_URL
              value: {{ printf "http://higress-console.%s.svc.cluster.local:8080" (include "hiclaw.namespace" .) | quote }}
            {{- end }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            {{- if $rrsaManual }}
            - name: ALIBABA_CLOUD_ROLE_ARN
              value: {{ .Values.manager.rrsa.manual.roleArn | quote }}
            - name: ALIBABA_CLOUD_OIDC_PROVIDER_ARN
              value: {{ include "hiclaw.rrsa.oidcProviderArn" . | quote }}
            - name: ALIBABA_CLOUD_OIDC_TOKEN_FILE
              value: {{ .Values.manager.rrsa.manual.tokenFile | quote }}
            {{- end }}
          {{- if $rrsaManual }}
          volumeMounts:
            - name: rrsa-oidc-token
              mountPath: {{ .Values.manager.rrsa.manual.tokenMountPath | quote }}
              readOnly: true
          {{- end }}
          {{- with .Values.manager.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
          {{- $hcCmd := ternary (printf "curl -sf http://127.0.0.1:%v/ >/dev/null" .Values.manager.service.targetPort) (printf "nc -z 127.0.0.1 %v" .Values.manager.service.targetPort) (eq .Values.manager.healthCheck.type "http") }}
          {{- if .Values.manager.healthCheck.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - {{ $hcCmd | quote }}
            initialDelaySeconds: 60
            periodSeconds: {{ .Values.manager.healthCheck.interval | int }}
            timeoutSeconds: 3
            failureThreshold: {{ .Values.manager.healthCheck.unhealthyThreshold | int }}
          {{- end }}
          {{- if .Values.manager.healthCheck.enabled }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - {{ $hcCmd | quote }}
            initialDelaySeconds: 20
            periodSeconds: {{ .Values.manager.healthCheck.interval | int }}
            timeoutSeconds: 3
            successThreshold: {{ .Values.manager.healthCheck.healthyThreshold | int }}
            failureThreshold: {{ .Values.manager.healthCheck.unhealthyThreshold | int }}
          {{- end }}
      {{- if $rrsaManual }}
      volumes:
        - name: rrsa-oidc-token
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  audience: sts.aliyuncs.com
                  expirationSeconds: {{ .Values.manager.rrsa.manual.expirationSeconds }}
                  path: token
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
