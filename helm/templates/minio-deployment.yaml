{{- if (include "hiclaw.isGenericK8s" .) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiclaw.minio.fullname" . }}
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.minio.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hiclaw.minio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hiclaw.minio.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: minio
          image: {{ include "hiclaw.minio.image" . }}
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - {{ printf ":%d" (.Values.minio.service.consolePort | int) | quote }}
          ports:
            - name: api
              containerPort: {{ .Values.minio.service.apiPort }}
              protocol: TCP
            - name: console
              containerPort: {{ .Values.minio.service.consolePort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "hiclaw.minio.fullname" . }}
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        {{- if .Values.minio.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hiclaw.minio.fullname" . }}-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
{{- end }}
