{{- if and (include "hiclaw.isGenericK8s" .) .Values.minio.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hiclaw.minio.fullname" . }}-data
  namespace: {{ include "hiclaw.namespace" . }}
  labels:
    {{- include "hiclaw.minio.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.minio.persistence.size | quote }}
  {{- if .Values.minio.persistence.storageClassName }}
  storageClassName: {{ .Values.minio.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
