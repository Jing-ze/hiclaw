# =============================================================================
# HiClaw — ACK / cloud (Coordinator Manager + Tuwunel + Element Web, same namespace)
# =============================================================================
# Configure manager.env and/or global.secret.stringData (chart Secret) or manager.envFromSecret (external Secret):
#   HICLAW_MATRIX_URL, HICLAW_MATRIX_DOMAIN, HICLAW_AI_GATEWAY_URL, HICLAW_OSS_BUCKET, ...
# Same-namespace K8s: Manager <-> Tuwunel use Cluster DNS (e.g. http://<tuwunel-svc>.<ns>.svc.cluster.local:6167).
# HICLAW_AI_GATEWAY_URL：LLM/APIG 出站；未单独设置 elementWeb.env.MATRIX_SERVER_URL 时，Element Web 的 MATRIX_SERVER_URL 与之相同（浏览器访问）。
# RRSA — two modes (see README.md):
#   manual  — projected ServiceAccount token + ALIBABA_CLOUD_* env (ACK doc「手动修改应用模板使用RRSA功能」)，无需 webhook/namespace 注解
#   webhook — ack-pod-identity-webhook：SA 注解 pod-identity.alibabacloud.com/role-name；建议 global.podIdentity.namespaceInjection
# =============================================================================

global:
  namespace: hiclaw
  platform: ""
  rrsa:
    oidcProviderArn: ""
  secret:
    enabled: true
    stringData:
      HICLAW_AI_GATEWAY_URL: ""
      HICLAW_OSS_BUCKET: ""
      HICLAW_MANAGER_PASSWORD: ""
      HICLAW_MANAGER_GATEWAY_KEY: ""
      HICLAW_REGISTRATION_TOKEN: ""
      HICLAW_ADMIN_USER: ""
      HICLAW_ADMIN_PASSWORD: ""
      HICLAW_ORCHESTRATOR_API_KEY: ""
      HICLAW_GW_MODEL_API_ID: ""
      HICLAW_GW_ENV_ID: ""
      HICLAW_CMS_TRACES_ENABLED: "false"
      HICLAW_CMS_ENDPOINT: ""
      HICLAW_CMS_LICENSE_KEY: ""
      HICLAW_CMS_PROJECT: ""
      HICLAW_CMS_WORKSPACE: ""
      HICLAW_CMS_SERVICE_NAME: ""

imagePullSecrets: []

workerImage:
  repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-worker
  tag: v1.0.9-rc-k8s

copawWorkerImage:
  repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-copaw-worker
  tag: v1.0.9-rc-k8s

workerRuntime: "openclaw"

manager:
  deploymentName: ""
  image:
    repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-manager-aliyun
    pullPolicy: Always
    tag: v1.0.9-rc-k8s
  healthCheck:
    enabled: true
    type: "tcp"                 # "tcp" or "http"
    interval: "5"               # Health check interval (seconds)
    healthyThreshold: "2"       # Consecutive successes to mark healthy
    unhealthyThreshold: "30"     # Consecutive failures to mark unhealthy
  rrsa:
    enabled: true
    mode: manual
    roleName: ""
    manual:
      roleArn: ""
      tokenMountPath: /var/run/secrets/ack.alibabacloud.com/rrsa-tokens
      tokenFile: /var/run/secrets/ack.alibabacloud.com/rrsa-tokens/token
      expirationSeconds: 3600
  resources:
    requests:
      cpu: "2"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 2Gi
  service:
    type: ClusterIP
    port: 18799
    targetPort: 18799
  env:
    HICLAW_RUNTIME: ""
    HICLAW_REGION: ""
    HICLAW_DEFAULT_MODEL: "qwen3.5-plus"
  envFromSecret: ""
  podSecurityContext: {}
  securityContext: {}

orchestrator:
  deploymentName: ""
  image:
    repository: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-orchestrator
    pullPolicy: IfNotPresent
    tag: v1.0.0-rc-k8s
  service:
    type: ClusterIP
    port: 2375
    targetPort: 2375
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 1Gi
  serviceAccount:
    create: true
    name: "hiclaw-orchestrator-sa"
    annotations: {}
  rrsa:
    enabled: true
    mode: manual
    roleName: ""
    manual:
      roleArn: ""
      tokenMountPath: /var/run/secrets/ack.alibabacloud.com/rrsa-tokens
      tokenFile: /var/run/secrets/ack.alibabacloud.com/rrsa-tokens/token
      expirationSeconds: 3600
  containerPrefix: "hiclaw-worker-"
  timezone: "Asia/Shanghai"
  env:
    HICLAW_GW_GATEWAY_ID: ""
    HICLAW_PROXY_CONTAINER_PREFIX: "hiclaw-worker-"
    HICLAW_WORKER_BACKEND: "k8s"
  envFromSecret: ""
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  allowedRegistries: []

replicaCount: 1

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: "hiclaw-manager-sa"
  annotations: {}

rbac:
  create: true
  additionalRules: []

tuwunel:
  deploymentName: ""
  image:
    registry: registry.cn-hangzhou.aliyuncs.com
    repository: hiclaw-cloud/tuwunel
    tag: "20260216"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    port: 6167
    annotations: {}
  persistence:
    enabled: true
    volumeMode: Filesystem
    annotations: {}
    selector: {}
    volumeName: ""
    accessModes:
      - ReadWriteMany
    size: 20Gi
    existingClaim: ""
    storageClassName: ""
    mountPath: /data/conduwuit
    nas:
      server: ""
    acs:
      mountOptions: "nolock,tcp,noresvport"
      storageClassName: "alibaba-cloud-nas"

    pv:
      enabled: true
      name: "hiclaw-data-pv"
      alicloudPvnameLabel: ""
      path: "/data/conduwuit"
      volumeHandle: ""
      storage: "20Gi"
      csiDriver: nasplugin.csi.alibabacloud.com
      mountOptions:
        - nolock,tcp,noresvport
        - vers=3
      reclaimPolicy: Retain
      volumeMode: ""
      extraLabels: {}
      annotations: {}
  env:
    CONDUWUIT_SERVER_NAME: ""
  extraEnv: []
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

elementWeb:
  deploymentName: ""
  image:
    registry: registry.cn-hangzhou.aliyuncs.com
    repository: hiclaw-cloud/element-web
    tag: "20260323"
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  env: {}
  extraEnv: []
  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

nameOverride: ""
fullnameOverride: ""

# ── MinIO（仅通用 k8s 模式，global.platform 为空时部署）──────────────────────
minio:
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
  auth:
    rootUser: "minioadmin"
    rootPassword: "minioadmin"
  bucketName: "hiclaw"

# ── Higress AI 网关（仅通用 k8s 模式，需设置 higress.enabled: true）────────
# Higress 通过 Helm 子 Chart 依赖部署。通用 k8s 模式下启用，阿里云模式下使用外部 APIG。
# 完整参数参考：https://higress.io/en/docs/latest/user/configurations/
higress:
  enabled: false
  global:
    local: true          # kind / minikube 等本地集群设为 true
  higress-core:
    gateway:
      replicas: 1
      httpPort: 80
      httpsPort: 443
    controller:
      replicas: 1
